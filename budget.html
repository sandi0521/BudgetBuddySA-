<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBuddy SA | Budget Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>💰 BudgetBuddy SA</h1>
    <p>Monthly Budget Calculator</p>
</header>

<div class="container">

    <h2>Enter Your Monthly Budget</h2>

    <label>Monthly Income</label>
    <input type="number" id="income" placeholder="Enter Income">

    <label>Food</label>
    <input type="number" id="food" placeholder="Food Expense">

    <label>Transport</label>
    <input type="number" id="transport" placeholder="Transport Expense">

    <label>Accommodation</label>
    <input type="number" id="accommodation" placeholder="Accommodation Expense">

    <label>Books</label>
    <input type="number" id="books" placeholder="Books Expense">

    <label>Entertainment</label>
    <input type="number" id="entertainment" placeholder="Entertainment Expense">

    <button onclick="calculateBudget()">
        Calculate Budget
    </button>

    <div class="menu-card">

        <h3>Budget Summary</h3>

        <p><strong>Total Expenses:</strong> <span id="totalExpenses">R0</span></p>

        <p><strong>Remaining Balance:</strong> <span id="remainingBalance">R0</span></p>

        <p><strong>Status:</strong> <span id="budgetStatus">-</span></p>

    </div>

    <button onclick="window.location.href='dashboard.html'">
        Back to Dashboard
    </button>

</div>

<script src="script.js"></script>

</body>

  </html>
