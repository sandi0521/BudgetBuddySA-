<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Budget Tracker | Budget Report</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body onload="loadReport()">

<header>
<h1>📄 Budget Report</h1>
<p>Your Monthly Financial Summary</p>
</header>

<div class="container">

<div class="menu-card">
<h3>💵 Monthly Income</h3>
<p id="reportIncome">R0</p>
</div>

<div class="menu-card">
<h3>🧾 Total Expenses</h3>
<p id="reportExpenses">R0</p>
</div>

<div class="menu-card">
<h3>💰 Remaining Balance</h3>
<p id="reportBalance">R0</p>
</div>

<div class="menu-card">
<h3>📊 Budget Status</h3>
<p id="reportStatus"></p>
</div>

<button onclick="downloadPDF()">
📄 Download PDF
</button>

<button onclick="window.location.href='dashboard.html'">
⬅ Back to Dashboard
</button>

</div>

<script src="script.js"></script>

</body>
</html>
