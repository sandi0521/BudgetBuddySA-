<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBuddy SA | Budget Statement</title>

    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadStatement()">

<header>
    <h1>📄 Budget Statement</h1>
    <p>Monthly Budget Summary</p>
</header>

<div class="container">

    <div class="menu-card">
        <h3>👤 Full Name</h3>
        <p id="statementName"></p>
    </div>

    <div class="menu-card">
        <h3>🎓 Student Number</h3>
        <p id="statementStudent"></p>
    </div>

    <div class="menu-card">
        <h3>💵 Monthly Income</h3>
        <p id="statementIncome"></p>
    </div>

    <div class="menu-card">
        <h3>🧾 Total Expenses</h3>
        <p id="statementExpenses"></p>
    </div>

    <div class="menu-card">
        <h3>💰 Remaining Balance</h3>
        <p id="statementBalance"></p>
    </div>

    <div class="menu-card">
        <h3>📊 Budget Status</h3>
        <p id="statementStatus"></p>
    </div>

    <button onclick="downloadPDF()">
        📄 Download PDF
    </button>

    <br><br>

    <button onclick="window.location.href='dashboard.html'">
        ⬅ Back to Dashboard
    </button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
